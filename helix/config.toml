theme = "transparent"

[editor]
line-number = "relative"
scrolloff = 5
auto-completion = true
auto-save = true
idle-timeout = 200
completion-trigger-len = 2

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[editor.lsp]
display-messages = true
display-inlay-hints = true

[editor.indent-guides]
render = true

[keys.normal]
"C-left" = "jump_view_left"
"C-down" = "jump_view_down"
"C-up" = "jump_view_up"
"C-right" = "jump_view_right"
