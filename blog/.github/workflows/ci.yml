name: ci
on:
  pull_request:
    branches:
      - development

env:
  NODE_VERSION: '22.13.0'
  PNPM_VERSION: '8'
  TEST_SERVER_PORT: 4173
  MIN_COVERAGE: 80

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install
      - name: SvelteKit Sync
        run: pnpm svelte-kit sync
      - name: Run parallel checks
        run: |
          pnpm format:check &
          pnpm lint &
          pnpm check &
          wait

  test:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install
      - name: Run tests with coverage
        run: pnpm test:coverage
      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: coverage/
          retention-days: 7
      - name: Check coverage thresholds
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')
          if (( $(echo "$COVERAGE < ${{ env.MIN_COVERAGE }}" | bc -l) )); then
            echo "Coverage ($COVERAGE%) is below minimum threshold (${{ env.MIN_COVERAGE }}%)"
            exit 1
          fi

  performance:
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false
      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV
      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-
      - name: Install dependencies
        run: pnpm install
      - name: Build production preview
        run: pnpm build
      - name: Start preview server
        run: |
          pnpm preview &
          sleep 5
      - name: Run Lighthouse
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v10
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          runs: 1
          urls: |
            http://localhost:${{ env.TEST_SERVER_PORT }}/

      - name: Print Lighthouse Scores
        shell: bash
        run: |
          LHCI_RESULTS="$(find /home/runner/work -name 'lhr-*.json' -type f | head -n1)"
          if [ -f "$LHCI_RESULTS" ]; then
            echo "Performance: $(jq '.categories.performance.score * 100' "$LHCI_RESULTS")%"
            echo "Accessibility: $(jq '.categories.accessibility.score * 100' "$LHCI_RESULTS")%"
            echo "Best Practices: $(jq '.categories["best-practices"].score * 100' "$LHCI_RESULTS")%"
            echo "SEO: $(jq '.categories.seo.score * 100' "$LHCI_RESULTS")%"
            echo ""
            echo "=== Warnings and Errors ==="
            jq -r '.audits | to_entries[] | select(.value.score != null and .value.score < 0.9) | "[\(.value.level)] \(.key): \(.value.title)"' "$LHCI_RESULTS"
          else
            echo "Error: Lighthouse results file not found"
            exit 1
          fi
